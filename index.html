        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;family=JetBrains+Mono&amp;display=swap');
        
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --accent: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        .math-font { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .question-card {
            display: none;
            transform-origin: center;
        }

        .question-card.active {
            display: block;
        }

        .feedback-pop {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e2e8f0;
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: var(--primary);
            transform: scale(1.5);
        }

        .progress-dot.completed {
            background: var(--success);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .input-field {
            border-bottom: 2px solid #e2e8f0;
            transition: border-color 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .part-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
        }

    &lt;script&gt;
        const questions = [
            // Part 1
            {
                part: &quot;Part 1: Quick-Fire&quot;,
                type: &quot;input&quot;,
                q: &quot;Solve quickly: \\(42 \\div 0.5 = \\)&quot;,
                ans: &quot;84&quot;,
                expl: &quot;Dividing by 0.5 is the same as doubling the number. \\(42 \\times 2 = 84\\).&quot;
            },
            {
                part: &quot;Part 1: Quick-Fire&quot;,
                type: &quot;input&quot;,
                q: &quot;Solve quickly: \\(150 \\div 0.2 = \\)&quot;,
                ans: &quot;750&quot;,
                expl: &quot;Dividing by 0.2 is the same as multiplying by 5. \\(150 \\times 5 = 750\\).&quot;
            },
            {
                part: &quot;Part 1: Quick-Fire&quot;,
                type: &quot;choice&quot;,
                q: &quot;Which is LARGER?&quot;,
                options: [&quot;\\(K \\div 0.25\\)&quot;, &quot;\\(K \\times 3\\)&quot;],

                expl: &quot;Dividing by 0.25 is the same as multiplying by 4. \\(K \\times 4\\) is larger than \\(K \\times 3\\).&quot;
            },
            {
                part: &quot;Part 1: Quick-Fire&quot;,
                type: &quot;input&quot;,
                q: &quot;Multiplier to INCREASE a price by 8%:&quot;,
                ans: &quot;1.08&quot;,
                expl: &quot;To increase by 8%, we add 8% to 100%, giving 108%. As a multiplier, this is 1.08.&quot;
            },
            {
                part: &quot;Part 1: Quick-Fire&quot;,
                type: &quot;input&quot;,
                q: &quot;Multiplier to DECREASE a weight by 15%:&quot;,
                ans: &quot;0.85&quot;,
                expl: &quot;To decrease by 15%, we subtract 15% from 100%, giving 85%. As a multiplier, this is 0.85.&quot;
            },
            // Part 2
            {
                part: &quot;Part 2: Ratio Battle&quot;,
                type: &quot;input&quot;,
                q: &quot;Red pens to blue pens ratio is 3:8. What fraction are red?&quot;,
                ans: &quot;3/11&quot;,
                expl: &quot;Total parts = \\(3 + 8 = 11\\). Red parts = 3. So the fraction is 3/11.&quot;
            },
            {
                part: &quot;Part 2: Ratio Battle&quot;,
                type: &quot;choice&quot;,
                q: &quot;Boys to girls ratio is 4:5. If 2 more of each join, is the new ratio 6:7 equivalent?&quot;,
                options: [&quot;Yes, they are equivalent&quot;, &quot;No, they are not equivalent&quot;],
                ans: 1,
                expl: &quot;Incorrect. Ratios only scale using multiplication or division (Scale Factor). You cannot add to both sides to find an equivalent ratio.&quot;
            },
            {
                part: &quot;Part 2: Ratio Battle&quot;,
                type: &quot;input&quot;,
                q: &quot;Emma and Jack share tokens 5:2. Emma gets 24 MORE than Jack. How many does Jack get?&quot;,
                ans: &quot;16&quot;,
                expl: &quot;Difference in parts = \\(5 - 2 = 3\\). These 3 parts represent 24 tokens. Magic 1 part = \\(24 \\div 3 = 8\\). Jack has 2 parts: \\(2 \\times 8 = 16\\).&quot;
            },
            {
                part: &quot;Part 2: Ratio Battle&quot;,
                type: &quot;input&quot;,
                q: &quot;Triangle angles ratio 1:3:5. Find the largest angle (Total \\(180^\\circ\\)).&quot;,
                ans: &quot;100&quot;,
                expl: &quot;Total parts = \\(1+3+5 = 9\\). Magic 1 part = \\(180 \\div 9 = 20^\\circ\\). Largest angle (5 parts) = \\(5 \\times 20 = 100^\\circ\\).&quot;
            },
            // Part 3
            {
                part: &quot;Part 3: Percentage Minefield&quot;,
                type: &quot;input&quot;,
                q: &quot;12% service charge added. Total bill is $56. Price before charge?&quot;,
                ans: &quot;50&quot;,
                expl: &quot;Truth Equation: 112% = 56. \\(1\\% = 56 \\div 112 = 0.5\\). \\(100\\% = 0.5 \\times 100 = 50\\).&quot;
            },
            {
                part: &quot;Part 3: Percentage Minefield&quot;,
                type: &quot;input&quot;,
                q: &quot;Saved $40 during a 25% off sale. Original price?&quot;,
                ans: &quot;160&quot;,
                expl: &quot;Truth Equation: 25% = 40 (Direct Match). \\(100\\% = 40 \\times 4 = 160\\).&quot;
            },
            {
                part: &quot;Part 3: Percentage Minefield&quot;,
                type: &quot;input&quot;,
                q: &quot;Car lost 18% value. Now worth $41,000. Original value?&quot;,
                ans: &quot;50000&quot;,
                expl: &quot;Truth Equation: 82% = 41000 (Enemy Match: \\(100-18=82\\)). \\(1\\% = 41000 \\div 82 = 500\\). \\(100\\% = 50000\\).&quot;
            },
            {
                part: &quot;Part 3: Percentage Minefield&quot;,
                type: &quot;input&quot;,
                q: &quot;65% complete = 260 MB. Total size?&quot;,
                ans: &quot;400&quot;,
                expl: &quot;Truth Equation: 65% = 260. Divide by 13: \\(5\\% = 20\\). Multiply by 20: \\(100\\% = 400\\).&quot;
            },
            // Part 4
            {
                part: &quot;Part 4: Inverse Proportion&quot;,
                type: &quot;input&quot;,
                q: &quot;4 builders take 15 days. How long for 6 builders?&quot;,
                ans: &quot;10&quot;,
                expl: &quot;Magic 1 (Total Effort) = \\(4 \\times 15 = 60\\) man-days. For 6 builders: \\(60 \\div 6 = 10\\) days.&quot;
            },
            {
                part: &quot;Part 4: Inverse Proportion&quot;,
                type: &quot;input&quot;,
                q: &quot;3 pumps take 8 hours. If 1 breaks (2 left), how long?&quot;,
                ans: &quot;12&quot;,
                expl: &quot;Magic 1 (Total Effort) = \\(3 \\times 8 = 24\\) pump-hours. For 2 pumps: \\(24 \\div 2 = 12\\) hours.&quot;
            },
            {
                part: &quot;Part 4: Inverse Proportion&quot;,
                type: &quot;input&quot;,
                q: &quot;Feed lasts 12 days for 5 horses. Farmer buys 1 more. Days left?&quot;,
                ans: &quot;10&quot;,
                expl: &quot;Magic 1 (Total Effort) = \\(5 \\times 12 = 60\\) horse-days. Now 6 horses: \\(60 \\div 6 = 10\\) days.&quot;
            },
            // Part 5
            {
                part: &quot;Part 5: Grandmaster&quot;,
                type: &quot;input&quot;,
                q: &quot;Boys:Girls = 3:5. Total 400. Boys increase by 15% next year. New boy count?&quot;,
                ans: &quot;172.5&quot;,
                expl: &quot;Total parts = 8. Magic 1 = \\(400 \\div 8 = 50\\). Boys now = \\(3 \\times 50 = 150\\). Next year: \\(150 \\times 1.15 = 172.5\\).&quot;
            },
            {
                part: &quot;Part 5: Grandmaster&quot;,
                type: &quot;choice&quot;,
                q: &quot;Console $400. Up 20%, then down 20%. Is final price $400?&quot;,
                options: [&quot;Yes, it's $400&quot;, &quot;No, it's $384&quot;],
                ans: 1,
                expl: &quot;Step 1: \\(400 \\times 1.2 = 480\\). Step 2: \\(480 \\times 0.8 = 384\\). The base changed!&quot;
            },
            {
                part: &quot;Part 5: Grandmaster&quot;,
                type: &quot;choice&quot;,
                q: &quot;4 painters, 6 hrs, $20/hr. If 3 painters do it, is total cost same?&quot;,
                options: [&quot;Yes, exactly the same ($480)&quot;, &quot;No, it's different&quot;],
                ans: 0,
                expl: &quot;Magic 1 = \\(4 \\times 6 = 24\\) total hours. 3 painters take \\(24 \\div 3 = 8\\) hours. Cost: \\(3 \\times 8 \\times 20 = 480\\). Inverse proportion magic!&quot;
            },
            {
                part: &quot;Part 5: Grandmaster&quot;,
                type: &quot;input&quot;,
                q: &quot;Sneakers $84 (30% off). This includes 20% profit. Factory cost?&quot;,
                ans: &quot;70&quot;,
                expl: &quot;Step 1: \\(70\\% = 84 \\rightarrow 100\\% = 120\\) (Pre-sale). Step 2: \\(120\\% = 84\\) (Wait, the key says $84 includes 20% profit). So \\(120\\% = 84 \\rightarrow 10\\% = 7 \\rightarrow 100\\% = 70\\).&quot;
            },
            // Part 6
            {
                part: &quot;Part 6: Logic&quot;,
                type: &quot;choice&quot;,
                q: &quot;Leo says: 'To divide by 0.2, I just multiply by 5.' Is he correct?&quot;,
                options: [&quot;Correct&quot;, &quot;Incorrect&quot;],
                ans: 0,
                expl: &quot;0.2 is 1/5. Asking how many fifths fit into a whole is the same as multiplying by 5.&quot;
            },
            {
                part: &quot;Part 6: Logic&quot;,
                type: &quot;input&quot;,
                q: &quot;If 60% = $18, find 100% using Magic 10% method.&quot;,
                ans: &quot;30&quot;,
                expl: &quot;Step 1: Divide by 6 to find 10% (\\(18 \\div 6 = 3\\)). Step 2: Multiply by 10 to find 100% (\\(3 \\times 10 = 30\\)).&quot;
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let studentResponses = []; // Store detailed responses for teacher portal

        function initProgress() {
            const container = document.getElementById('progress-dots');
            questions.forEach((_, i) =&gt; {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dot.id = `dot-${i}`;
                container.appendChild(dot);
            });
        }

        function startTest() {
            anime({
                targets: '#start-screen',
                opacity: 0,
                translateY: -20,
                duration: 500,
                easing: 'easeInQuad',
                complete: () =&gt; {
                    document.getElementById('start-screen').classList.add('hidden');
                    document.getElementById('question-area').classList.remove('hidden');
                    renderQuestion();
                }
            });
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            const area = document.getElementById('question-area');
            area.innerHTML = '';

            const card = document.createElement('div');
            card.className = 'glass-panel p-8 rounded-3xl shadow-xl space-y-6';
            
            let inputHtml = '';
            if (q.type === 'input') {
                inputHtml = `
                    &lt;div class=&quot;mt-6&quot;&gt;
                        &lt;input type=&quot;text&quot; id=&quot;user-input&quot; class=&quot;input-field w-full py-3 text-2xl font-bold text-center math-font&quot; placeholder=&quot;Type answer...&quot; onkeypress=&quot;if(event.key === 'Enter') checkAnswer()&quot;&gt;
                    &lt;/div&gt;
                `;
            } else {
                inputHtml = `&lt;div class=&quot;grid grid-cols-1 gap-3 mt-6&quot;&gt;
                    ${q.options.map((opt, i) =&gt; `
                        &lt;button onclick=&quot;checkAnswer(${i})&quot; class=&quot;text-left p-4 rounded-xl border-2 border-slate-100 hover:border-indigo-500 hover:bg-indigo-50 transition-all font-medium&quot;&gt;
                            ${opt}
                        &lt;/button&gt;
                    `).join('')}
                &lt;/div&gt;`;
            }

            card.innerHTML = `
                &lt;div class=&quot;flex justify-between items-center&quot;&gt;
                    &lt;span class=&quot;part-tag bg-indigo-100 text-indigo-600&quot;&gt;${q.part}&lt;/span&gt;
                    &lt;span class=&quot;text-xs font-bold text-slate-400&quot;&gt;Q${currentQuestion + 1}/${questions.length}&lt;/span&gt;
                &lt;/div&gt;
                &lt;h3 class=&quot;text-2xl font-bold text-slate-800 leading-snug&quot;&gt;${q.q}&lt;/h3&gt;
                ${inputHtml}
                ${q.type === 'input' ? `&lt;button onclick=&quot;checkAnswer()&quot; class=&quot;w-full btn-primary text-white py-4 rounded-2xl font-bold mt-4&quot;&gt;Submit Answer&lt;/button&gt;` : ''}
            `;

            area.appendChild(card);
            
            // Update dots
            document.querySelectorAll('.progress-dot').forEach((dot, i) =&gt; {
                dot.classList.remove('active');
                if (i === currentQuestion) dot.classList.add('active');
            });

            anime({
                targets: card,
                opacity: [0, 1],
                translateY: [20, 0],
                duration: 600,
                easing: 'easeOutCubic'
            });

            if (window.MathJax) MathJax.typeset();
        }

        function checkAnswer(choiceIndex = null) {
            const q = questions[currentQuestion];
            let isCorrect = false;
            let userVal = &quot;&quot;;
            
            if (q.type === 'input') {
                userVal = document.getElementById('user-input').value.trim();
                isCorrect = userVal.toLowerCase() === q.ans.toLowerCase();
            } else {
                userVal = q.options[choiceIndex];
                isCorrect = choiceIndex === q.ans;
            }

            if (isCorrect) score++;
            
            // Record response
            studentResponses.push({
                q: q.q,
                part: q.part,
                user: userVal,
                correct: isCorrect,
                ans: q.type === 'input' ? q.ans : q.options[q.ans]
            });

            showFeedback(isCorrect, q.expl);
        }

        function showFeedback(isCorrect, msg) {
            const overlay = document.getElementById('feedback-overlay');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            const message = document.getElementById('feedback-msg');

            icon.innerHTML = isCorrect ? '🌟' : '💡';
            title.innerText = isCorrect ? 'Brilliant!' : 'Not Quite';
            title.style.color = isCorrect ? 'var(--success)' : 'var(--accent)';
            message.innerHTML = msg;
            overlay.style.borderColor = isCorrect ? 'var(--success)' : 'var(--accent)';

            anime.timeline()
                .add({
                    targets: overlay,
                    opacity: [0, 1],
                    scale: [0.5, 1],
                    duration: 400,
                    easing: 'easeOutBack',
                    begin: () =&gt; { overlay.style.pointerEvents = 'auto'; }
                });

            // Add a continue button to feedback
            const btn = document.createElement('button');
            btn.className = 'mt-6 w-full py-3 rounded-xl bg-slate-800 text-white font-bold';
            btn.innerText = 'Continue';
            btn.onclick = () =&gt; {
                anime({
                    targets: overlay,
                    opacity: 0,
                    scale: 0.5,
                    duration: 300,
                    easing: 'easeInBack',
                    complete: () =&gt; {
                        overlay.style.pointerEvents = 'none';
                        btn.remove();
                        nextQuestion();
                    }
                });
            };
            overlay.appendChild(btn);
            
            if (window.MathJax) MathJax.typeset();
        }

        function nextQuestion() {
            document.getElementById(`dot-${currentQuestion}`).classList.add('completed');
            currentQuestion++;
            if (currentQuestion &lt; questions.length) {
                renderQuestion();
            } else {
                showFinalResult();
            }
        }

        function showFinalResult() {
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const percentage = (score / questions.length) * 100;
            const offset = 553 - (553 * percentage / 100);
            
            anime({
                targets: '#score-circle',
                strokeDashoffset: offset,
                duration: 2000,
                easing: 'easeInOutQuart'
            });

            anime({
                targets: '#final-score-text',
                innerHTML: [0, score],
                round: 1,
                duration: 2000,
                easing: 'easeInOutQuart'
            });

            const rank = document.getElementById('rank-title');
            const desc = document.getElementById('rank-desc');

            if (percentage &gt;= 90) {
                rank.innerText = &quot;Math Grandmaster&quot;;
                desc.innerText = &quot;Absolute perfection! You've mastered the MYP Level 1.&quot;;
            } else if (percentage &gt;= 70) {
                rank.innerText = &quot;Math Elite&quot;;
                desc.innerText = &quot;Great job! You have a strong grasp of these concepts.&quot;;
            } else if (percentage &gt;= 50) {
                rank.innerText = &quot;Math Warrior&quot;;
                desc.innerText = &quot;Good effort. A bit more practice and you'll be elite!&quot;;
            } else {
                rank.innerText = &quot;Math Apprentice&quot;;
                desc.innerText = &quot;Keep practicing those mental shortcuts and truth equations!&quot;;
            }

            // Generate Teacher Code
            const codeData = {
                name: &quot;Student&quot;,
                score: score,
                total: questions.length,
                responses: studentResponses,
                timestamp: new Date().toLocaleString()
            };
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(codeData))));
            document.getElementById('teacher-code-input').value = `MYP1-${encoded}`;
        }

        function copyTeacherCode() {
            const input = document.getElementById('teacher-code-input');
            input.select();
            document.execCommand('copy');
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = 'Copied!';
            btn.classList.replace('bg-indigo-600', 'bg-green-600');
            setTimeout(() =&gt; {
                btn.innerText = originalText;
                btn.classList.replace('bg-green-600', 'bg-indigo-600');
            }, 2000);
        }

        // --- Teacher Portal Logic ---
        function openPortal() {
            document.getElementById('teacher-portal').classList.remove('hidden');
            anime({
                targets: '#teacher-portal',
                opacity: [0, 1],
                duration: 400,
                easing: 'easeOutQuad'
            });
        }

        function closePortal() {
            anime({
                targets: '#teacher-portal',
                opacity: 0,
                duration: 300,
                easing: 'easeInQuad',
                complete: () =&gt; {
                    document.getElementById('teacher-portal').classList.add('hidden');
                    document.getElementById('portal-results').classList.add('hidden');
                    document.getElementById('portal-code-input').value = '';
                }
            });
        }

        function decodeStudentCode() {
            const rawCode = document.getElementById('portal-code-input').value.trim();
            if (!rawCode.startsWith('MYP1-')) {
                alert(&quot;Invalid code format. Please ensure it starts with 'MYP1-'&quot;);
                return;
            }

            try {
                const base64 = rawCode.replace('MYP1-', '');
                const data = JSON.parse(decodeURIComponent(escape(atob(base64))));
                renderPortalResults(data);
            } catch (e) {
                alert(&quot;Failed to decode code. Please check if the code is complete.&quot;);
            }
        }

        function renderPortalResults(data) {
            const container = document.getElementById('portal-results');
            container.innerHTML = '';
            container.classList.remove('hidden');

            const summaryHtml = `
                &lt;div class=&quot;grid grid-cols-1 md:grid-cols-3 gap-4&quot;&gt;
                    &lt;div class=&quot;bg-slate-50 p-4 rounded-2xl border border-slate-100&quot;&gt;
                        &lt;p class=&quot;text-[10px] font-bold text-slate-400 uppercase tracking-widest&quot;&gt;Student Name&lt;/p&gt;
                        &lt;p class=&quot;text-xl font-bold text-slate-800&quot;&gt;${data.name}&lt;/p&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;bg-slate-50 p-4 rounded-2xl border border-slate-100&quot;&gt;
                        &lt;p class=&quot;text-[10px] font-bold text-slate-400 uppercase tracking-widest&quot;&gt;Final Score&lt;/p&gt;
                        &lt;p class=&quot;text-xl font-bold text-indigo-600&quot;&gt;${data.score} / ${data.total}&lt;/p&gt;
                    &lt;/div&gt;
                    &lt;div class=&quot;bg-slate-50 p-4 rounded-2xl border border-slate-100&quot;&gt;
                        &lt;p class=&quot;text-[10px] font-bold text-slate-400 uppercase tracking-widest&quot;&gt;Completion Time&lt;/p&gt;
                        &lt;p class=&quot;text-sm font-bold text-slate-800&quot;&gt;${data.timestamp}&lt;/p&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
                &lt;div class=&quot;space-y-3&quot;&gt;
                    &lt;h4 class=&quot;font-bold text-slate-800 border-b pb-2&quot;&gt;Question Breakdown&lt;/h4&gt;
                    &lt;div class=&quot;space-y-2&quot;&gt;
                        ${data.responses.map((res, i) =&gt; `
                            &lt;div class=&quot;flex items-start gap-4 p-4 rounded-xl border ${res.correct ? 'bg-green-50 border-green-100' : 'bg-red-50 border-red-100'}&quot;&gt;
                                &lt;div class=&quot;w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs font-bold ${res.correct ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}&quot;&gt;
                                    ${i + 1}
                                &lt;/div&gt;
                                &lt;div class=&quot;flex-1 space-y-1&quot;&gt;
                                    &lt;p class=&quot;text-xs font-bold text-slate-400 uppercase&quot;&gt;${res.part}&lt;/p&gt;
                                    &lt;p class=&quot;text-sm font-medium text-slate-800&quot;&gt;${res.q}&lt;/p&gt;
                                    &lt;div class=&quot;flex gap-4 mt-2 text-xs&quot;&gt;
                                        &lt;p&gt;&lt;span class=&quot;text-slate-500&quot;&gt;Student:&lt;/span&gt; &lt;span class=&quot;font-bold ${res.correct ? 'text-green-600' : 'text-red-600'}&quot;&gt;${res.user}&lt;/span&gt;&lt;/p&gt;
                                        ${!res.correct ? `&lt;p&gt;&lt;span class=&quot;text-slate-500&quot;&gt;Correct:&lt;/span&gt; &lt;span class=&quot;font-bold text-slate-800&quot;&gt;${res.ans}&lt;/span&gt;&lt;/p&gt;` : ''}
                                    &lt;/div&gt;
                                &lt;/div&gt;
                            &lt;/div&gt;
                        `).join('')}
                    &lt;/div&gt;
                &lt;/div&gt;
            `;

            container.innerHTML = summaryHtml;
            
            anime({
                targets: '#portal-results',
                opacity: [0, 1],
                translateY: [10, 0],
                duration: 500,
                easing: 'easeOutQuad'
            });
        }

        window.onload = () =&gt; {
            initProgress();
        };
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

      event.stopPropagation()

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
</body>

</html>
